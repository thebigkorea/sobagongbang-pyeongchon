<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>소바공방 평촌점 출퇴근</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 22px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      margin-top: 20px;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin: 10px 0 6px;
    }

    .store {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #555;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 16px;
      font-size: 16px;
      font-weight: bold;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 15px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 12px;
      margin-top: 8px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      margin-top: 16px;
      cursor: pointer;
    }

    .primary {
      background: #1a73e8;
      color: white;
    }

    .checkin {
      background: #188038;
      color: white;
    }

    .checkout {
      background: #d93025;
      color: white;
    }

    .gray {
      background: #666;
      color: white;
    }

    .msg {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #eef3ff;
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .hidden {
      display: none;
    }

    .info {
      margin-top: 12px;
      font-size: 15px;
      color: #666;
      text-align: center;
    }

    .userbox {
      background: #f1f3f4;
      border-radius: 12px;
      padding: 14px;
      font-size: 17px;
      margin-bottom: 14px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <h1>출퇴근 등록</h1>
    <div class="store">소바공방 평촌점</div>

    <div id="loginCard" class="card">
      <label>직원명</label>
      <input id="name" type="text" placeholder="직원명을 입력하세요" />

      <label>전화번호</label>
      <input id="phone" type="tel" placeholder="01012345678" />

      <button class="primary" onclick="register()">직원등록</button>
      <button class="gray" onclick="login()">로그인</button>

      <div id="loginMsg" class="msg hidden"></div>
    </div>

    <div id="mainCard" class="card hidden">
      <div class="userbox">
        <div><b>매장:</b> 소바공방 평촌점</div>
        <div><b>직원:</b> <span id="userName"></span></div>
        <div><b>전화:</b> <span id="userPhone"></span></div>
      </div>

      <button class="checkin" onclick="attendance('출근')">출근하기</button>
      <button class="checkout" onclick="attendance('퇴근')">퇴근하기</button>
      <button class="gray" onclick="logout()">다른 직원으로 로그인</button>

      <div class="info">
        출퇴근 시 현재 위치와 매장까지의 거리가 함께 저장됩니다.
      </div>

      <div id="mainMsg" class="msg hidden"></div>
    </div>

  </div>

  <script>
    /************************************
     * 소바공방 평촌점 위치
     * 실제 매장 GPS와 다르면 이 두 줄만 수정
     ************************************/
    const STORE_LAT = 37.3906;
    const STORE_LNG = 126.9507;

    const STORAGE_KEY = "sobagongbang_pyeongchon_employee";

    window.onload = function () {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (saved) {
        const emp = JSON.parse(saved);
        showMain(emp);
      }
    };

    function getInputEmployee() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.replace(/[^0-9]/g, "");

      if (!name || !phone) {
        showLoginMsg("직원명과 전화번호를 입력하세요.");
        return null;
      }

      return {
        name,
        phone,
        userAgent: navigator.userAgent
      };
    }

    function register() {
      const data = getInputEmployee();
      if (!data) return;

      showLoginMsg("직원등록 처리중입니다...");

      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.success) {
            const emp = res.employee || data;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(emp));
            showMain(emp);
          } else {
            showLoginMsg(res.message || "직원등록에 실패했습니다.");
          }
        })
        .withFailureHandler(function (err) {
          showLoginMsg("오류가 발생했습니다.\n" + err.message);
        })
        .registerEmployee(data);
    }

    function login() {
      const data = getInputEmployee();
      if (!data) return;

      showLoginMsg("로그인 처리중입니다...");

      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.success) {
            const emp = res.employee || data;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(emp));
            showMain(emp);
          } else {
            showLoginMsg(res.message || "로그인에 실패했습니다.");
          }
        })
        .withFailureHandler(function (err) {
          showLoginMsg("오류가 발생했습니다.\n" + err.message);
        })
        .loginEmployee(data);
    }

    function attendance(type) {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        showMainMsg("직원 정보가 없습니다. 다시 로그인하세요.");
        return;
      }

      const emp = JSON.parse(saved);

      showMainMsg(type + " 위치 확인중입니다...");

      if (!navigator.geolocation) {
        showMainMsg("이 기기에서는 위치 확인을 지원하지 않습니다.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (pos) {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          const distanceMeter = calculateDistance(
            lat,
            lng,
            STORE_LAT,
            STORE_LNG
          );

          const data = {
            name: emp.name,
            phone: emp.phone,
            type: type,
            lat: lat,
            lng: lng,
            distance: Math.round(distanceMeter) + "m",
            userAgent: navigator.userAgent
          };

          showMainMsg(type + " 처리중입니다...\n현재 거리: " + data.distance);

          google.script.run
            .withSuccessHandler(function (res) {
              if (res && res.success) {
                showMainMsg(
                  res.message + "\n" +
                  "시간: " + res.time + "\n" +
                  "매장과의 거리: " + data.distance
                );
              } else {
                showMainMsg(res.message || type + " 처리에 실패했습니다.");
              }
            })
            .withFailureHandler(function (err) {
              showMainMsg("오류가 발생했습니다.\n" + err.message);
            })
            .saveAttendance(data);
        },
        function (err) {
          let msg = "위치 확인에 실패했습니다.";

          if (err.code === 1) msg = "위치 권한이 거부되었습니다. 브라우저 위치 권한을 허용해주세요.";
          if (err.code === 2) msg = "현재 위치를 확인할 수 없습니다.";
          if (err.code === 3) msg = "위치 확인 시간이 초과되었습니다.";

          showMainMsg(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function calculateDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function toRad(value) {
      return value * Math.PI / 180;
    }

    function showMain(emp) {
      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("mainCard").classList.remove("hidden");

      document.getElementById("userName").innerText = emp.name || "";
      document.getElementById("userPhone").innerText = emp.phone || "";
    }

    function logout() {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    function showLoginMsg(text) {
      const el = document.getElementById("loginMsg");
      el.classList.remove("hidden");
      el.innerText = text;
    }

    function showMainMsg(text) {
      const el = document.getElementById("mainMsg");
      el.classList.remove("hidden");
      el.innerText = text;
    }
  </script>
</body>
</html>
