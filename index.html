<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평촌 소바공방 출퇴근</title>

<style>
body { margin:0; font-family:"Noto Sans KR"; background:#f8f5ef; }
.container { max-width:480px; margin:auto; padding:20px; }
.card { background:white; border-radius:20px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
.title { text-align:center; font-size:28px; font-weight:900; }
.sub { text-align:center; color:#777; margin-bottom:20px; }
input { width:100%; height:55px; margin-top:10px; border-radius:12px; border:1px solid #ddd; padding-left:15px; font-size:18px; }
button { width:100%; height:60px; border:none; border-radius:15px; margin-top:15px; font-size:20px; font-weight:900; }
.btn-main { background:#4a2d18; color:white; }
.btn-in { background:#1e8e3e; color:white; }
.btn-out { background:#d93025; color:white; }
.status { text-align:center; margin-top:15px; font-weight:800; }
</style>
</head>

<body>

<div class="container">

<div id="register" class="card">
<div class="title">소바공방</div>
<div class="sub">평촌점 직원등록</div>

<input id="name" placeholder="이름">
<input id="phone" placeholder="전화번호">

<button class="btn-main" onclick="register()">등록하기</button>
<div id="regMsg" class="status"></div>
</div>

<div id="main" class="card" style="display:none;">
<div class="title">출퇴근</div>
<div id="userName" class="sub"></div>

<button id="inBtn" class="btn-in" onclick="send('출근')">출근</button>
<button id="outBtn" class="btn-out" onclick="send('퇴근')">퇴근</button>

<button onclick="reset()">직원 재등록</button>

<div id="msg" class="status"></div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwqe8v-KtP_xn3eJ3keFMJ8a4G0zyfk6Rj5lBFZ8oSoVHm370qQ9xjUpi0bzEPbBxed/exec";

const KEY = "SOBA_USER";
const ACTION = "SOBA_ACTION";

window.onload = () => {
  const saved = JSON.parse(localStorage.getItem(KEY));
  if(saved){
    showMain(saved);
  }
}

function register(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if(!name || !phone){
    document.getElementById("regMsg").innerText="입력하세요";
    return;
  }

  const user = {name, phone};
  localStorage.setItem(KEY, JSON.stringify(user));

  showMain(user);
}

function showMain(user){
  document.getElementById("register").style.display="none";
  document.getElementById("main").style.display="block";
  document.getElementById("userName").innerText = user.name + "님";
  updateBtn();
}

function updateBtn(){
  const last = localStorage.getItem(ACTION);
  document.getElementById("inBtn").disabled = (last==="출근");
  document.getElementById("outBtn").disabled = (last!=="출근");
}

async function send(type){
  const user = JSON.parse(localStorage.getItem(KEY));
  const msg = document.getElementById("msg");

  msg.innerText = "처리중...";

  try{
    await fetch(API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({
        name:user.name,
        phone:user.phone,
        type:type,
        store:"평촌 소바공방",
        timestamp:new Date().toISOString(),
        userAgent:navigator.userAgent
      })
    });

    localStorage.setItem(ACTION, type);
    msg.innerText = type + " 완료";

  }catch(e){
    msg.innerText = "오류 발생";
  }

  updateBtn();
}

function reset(){
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
